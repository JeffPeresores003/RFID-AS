<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFID Scanner - RFID Attendance</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1 class="header-title">
        📚 RFID Attendance
      </h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn">Dashboard</a>
        <a href="register.html" class="nav-btn">Register</a>
        <a href="scanner.html" class="nav-btn active">Scanner</a>
        <a href="history.html" class="nav-btn">History</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <h1 class="page-title">RFID Scanner</h1>
    <p class="page-subtitle">Real-time attendance monitoring</p>

    <!-- Scanner Status -->
    <div class="card" style="text-align: center;">
      <div id="scannerStatus">
        <div class="scan-icon">📡</div>
        <div class="scan-message" style="color: var(--text-light);">Scanner Ready</div>
        <div style="color: var(--text-light); margin-top: 0.5rem; font-size: 0.875rem;">
          Click the button below to start scanning
        </div>
      </div>
      <div style="margin-top: 1.5rem;">
        <button id="toggleScanBtn" class="btn btn-primary" onclick="toggleScanning()">
          ▶️ Start Scanning
        </button>
      </div>
    </div>

    <!-- Last Scan Result -->
    <div id="lastScanContainer"></div>

    <!-- Recent Scans Today -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2 class="card-title" style="margin: 0;">Today's Scans</h2>
        <span class="badge badge-primary" id="todayCount">0</span>
      </div>
      <div id="todayScansContainer">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </main>

  <script>
    // API Base URL
    const API_URL = 'http://localhost:3000/api';

    let eventSource = null;
    let scanSound = null;
    let isScanning = false;

    // Create audio for scan feedback (optional)
    try {
      scanSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSyCzvLZiTcIGmi77eefTRAMUKrj8LRhGwU7k9nyyHgrBSh+zPLTgjMIHG7A7+OZSBEMV6/l8augVRIIQ6Pf87txIwU7k9ryz4IuCCGB0fPTgjQIHnXJ8djjks...');
    } catch (e) {
      console.log('Audio not supported');
    }

    // Toggle scanning on/off
    function toggleScanning() {
      if (isScanning) {
        stopScanning();
      } else {
        startScanning();
      }
    }

    // Start scanning
    function startScanning() {
      isScanning = true;
      const statusDiv = document.getElementById('scannerStatus');
      const toggleBtn = document.getElementById('toggleScanBtn');
      
      toggleBtn.innerHTML = '⏹️ Stop Scanning';
      toggleBtn.classList.remove('btn-primary');
      toggleBtn.classList.add('btn-danger');
      
      statusDiv.innerHTML = `
        <div class="scan-icon pulse" style="color: var(--secondary-color);">📡</div>
        <div class="scan-message" style="color: var(--secondary-color);">Scanner Active</div>
        <div style="color: var(--text-light); margin-top: 0.5rem;">
          Ready to scan RFID cards
        </div>
      `;
      
      // Initialize SSE connection
      eventSource = new EventSource(`${API_URL}/scan-events`);
      
      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleScanEvent(data);
      };

      eventSource.onerror = () => {
        statusDiv.innerHTML = `
          <div class="scan-icon" style="color: var(--danger-color);">⚠️</div>
          <div class="scan-message" style="color: var(--danger-color);">Scanner Disconnected</div>
          <div style="color: var(--text-light); margin-top: 0.5rem;">
            Attempting to reconnect...
          </div>
        `;
        
        // Auto-reconnect after 3 seconds if still in scanning mode
        if (isScanning) {
          setTimeout(() => {
            if (eventSource.readyState === EventSource.CLOSED && isScanning) {
              startScanning();
            }
          }, 3000);
        }
      };
    }

    // Stop scanning
    function stopScanning() {
      isScanning = false;
      const statusDiv = document.getElementById('scannerStatus');
      const toggleBtn = document.getElementById('toggleScanBtn');
      
      toggleBtn.innerHTML = '▶️ Start Scanning';
      toggleBtn.classList.remove('btn-danger');
      toggleBtn.classList.add('btn-primary');
      
      statusDiv.innerHTML = `
        <div class="scan-icon" style="color: var(--text-light);">📡</div>
        <div class="scan-message" style="color: var(--text-light);">Scanner Stopped</div>
        <div style="color: var(--text-light); margin-top: 0.5rem; font-size: 0.875rem;">
          Click the button below to resume scanning
        </div>
      `;
      
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
    }

    // Handle scan event
    function handleScanEvent(data) {
      const container = document.getElementById('lastScanContainer');
      
      // Play sound feedback (if available)
      if (scanSound) {
        scanSound.play().catch(e => console.log('Audio play failed'));
      }

      if (data.status === 'success') {
        // Successful scan
        container.innerHTML = `
          <div class="scan-status" style="border: 3px solid var(--secondary-color);">
            <div class="scan-icon" style="color: var(--secondary-color);">✅</div>
            <div class="scan-message" style="color: var(--secondary-color);">Attendance Recorded</div>
            <div class="scan-student-info">
              <div class="scan-student-name">${data.student.fullname}</div>
              <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;">
                <div>
                  <strong>ID:</strong> ${data.student.student_id}
                </div>
                <div>
                  <strong>Grade:</strong> ${data.student.grade}
                </div>
                <div>
                  <strong>Section:</strong> ${data.student.section}
                </div>
              </div>
              <div style="margin-top: 1rem; color: var(--text-light); font-size: 0.875rem;">
                ${formatTimestamp(data.timestamp)}
              </div>
            </div>
          </div>
        `;
      } else if (data.status === 'duplicate') {
        // Duplicate scan - already scanned today
        container.innerHTML = `
          <div class="scan-status" style="border: 3px solid var(--warning-color);">
            <div class="scan-icon" style="color: var(--warning-color);">⚠️</div>
            <div class="scan-message" style="color: var(--warning-color);">Already Scanned Today</div>
            <div class="scan-student-info">
              <div class="scan-student-name">${data.student.fullname}</div>
              <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem;">
                <div>
                  <strong>ID:</strong> ${data.student.student_id}
                </div>
                <div>
                  <strong>Grade:</strong> ${data.student.grade}
                </div>
                <div>
                  <strong>Section:</strong> ${data.student.section}
                </div>
              </div>
              <div style="margin-top: 1rem; padding: 1rem; background: var(--bg-light); border-radius: 0.5rem;">
                <div style="color: var(--text-dark); font-weight: 500;">Previous scan:</div>
                <div style="color: var(--text-light); font-size: 0.875rem; margin-top: 0.25rem;">
                  ${data.previous_scan ? formatTimestamp(data.previous_scan) : 'Earlier today'}
                </div>
              </div>
            </div>
          </div>
        `;
      } else {
        // Failed scan (unknown card)
        container.innerHTML = `
          <div class="scan-status" style="border: 3px solid var(--danger-color);">
            <div class="scan-icon" style="color: var(--danger-color);">❌</div>
            <div class="scan-message" style="color: var(--danger-color);">Card Not Registered</div>
            <div class="scan-details">
              <div style="margin-top: 1rem; padding: 1rem; background: var(--bg-light); border-radius: 0.5rem;">
                <strong>Card UID:</strong> <code>${data.uid}</code>
              </div>
              <div style="margin-top: 1rem;">
                <a href="register.html" class="btn btn-primary">
                  Register This Card
                </a>
              </div>
            </div>
          </div>
        `;
      }

      // Refresh today's scans
      loadTodayScans();
    }

    // Load today's scans
    async function loadTodayScans() {
      try {
        const today = new Date().toISOString().split('T')[0];
        const response = await fetch(`${API_URL}/attendance/filter?date=${today}`);
        const scans = await response.json();
        
        const container = document.getElementById('todayScansContainer');
        const countBadge = document.getElementById('todayCount');
        
        countBadge.textContent = scans.length;
        
        if (scans.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <div class="empty-state-text">No scans yet today</div>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>Student ID</th>
                  <th>Name</th>
                  <th class="hide-mobile">Grade</th>
                  <th class="hide-mobile">Section</th>
                </tr>
              </thead>
              <tbody>
                ${scans.map(scan => `
                  <tr>
                    <td><strong>${scan.scanned_at ? new Date(scan.scanned_at).toLocaleTimeString() : 'N/A'}</strong></td>
                    <td>${scan.student_id || 'N/A'}</td>
                    <td>${scan.fullname || 'N/A'}</td>
                    <td class="hide-mobile"><span class="badge badge-primary">Grade ${scan.grade || 'N/A'}</span></td>
                    <td class="hide-mobile">${scan.section || 'N/A'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        console.error('Error loading today\'s scans:', error);
        document.getElementById('todayScansContainer').innerHTML = `
          <div class="alert alert-error">
            Failed to load scans
          </div>
        `;
      }
    }

    // Format timestamp
    function formatTimestamp(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    // Initialize (don't auto-start scanning)
    loadTodayScans();

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
      if (eventSource) {
        eventSource.close();
      }
    });
  </script>
</body>
</html>
