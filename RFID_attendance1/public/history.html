<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance History - RFID Attendance</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1 class="header-title">
        📚 RFID Attendance
      </h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn">Dashboard</a>
        <a href="register.html" class="nav-btn">Register</a>
        <a href="scanner.html" class="nav-btn">Scanner</a>
        <a href="history.html" class="nav-btn active">History</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <h1 class="page-title">Attendance History</h1>
    <p class="page-subtitle">View and export attendance records</p>

    <!-- Filters -->
    <div class="filters">
      <h3 style="font-size: 1rem; font-weight: 600; margin-bottom: 1rem;">Filters</h3>
      <div class="filters-grid">
        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="filterDate">Date</label>
          <input type="date" id="filterDate" class="form-input">
        </div>
        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="filterStudentId">Student ID</label>
          <input type="text" id="filterStudentId" class="form-input" placeholder="e.g., 2024-001">
        </div>
        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="filterGrade">Grade</label>
          <select id="filterGrade" class="form-input">
            <option value="">All Grades</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
            <option value="10">Grade 10</option>
            <option value="11">Grade 11</option>
            <option value="12">Grade 12</option>
          </select>
        </div>
        <div class="form-group" style="margin: 0;">
          <label class="form-label" for="filterSection">Section</label>
          <input type="text" id="filterSection" class="form-input" placeholder="e.g., A">
        </div>
      </div>
      <div class="filter-actions">
        <button onclick="applyFilters()" class="btn btn-primary">
          🔍 Apply Filters
        </button>
        <button onclick="clearFilters()" class="btn btn-outline">
          ❌ Clear
        </button>
        <button onclick="exportFiltered()" class="btn btn-secondary">
          📥 Export CSV
        </button>
      </div>
    </div>

    <!-- Results -->
    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
        <h2 class="card-title" style="margin: 0;">Records</h2>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <span class="badge badge-primary" id="recordCount">0 records</span>
        </div>
      </div>
      <div id="historyContainer">
        <div class="loading">Loading attendance history...</div>
      </div>
    </div>
  </main>

  <script>
    // API Base URL
    const API_URL = 'http://localhost:3000/api';

    let currentFilters = {};

    // Load attendance history
    async function loadHistory(filters = {}) {
      try {
        const params = new URLSearchParams(filters);
        const url = filters && Object.keys(filters).length > 0 
          ? `${API_URL}/attendance/filter?${params}`
          : `${API_URL}/attendance`;
        
        const response = await fetch(url);
        const attendance = await response.json();
        
        const container = document.getElementById('historyContainer');
        const countBadge = document.getElementById('recordCount');
        
        countBadge.textContent = `${attendance.length} record${attendance.length !== 1 ? 's' : ''}`;
        
        if (attendance.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <div class="empty-state-text">No attendance records found</div>
              ${Object.keys(filters).length > 0 ? '<p style="margin-top: 0.5rem;">Try adjusting your filters</p>' : ''}
            </div>
          `;
          return;
        }

        // Group by date
        const groupedByDate = {};
        attendance.forEach(record => {
          const date = record.scanned_at.split('T')[0];
          if (!groupedByDate[date]) {
            groupedByDate[date] = [];
          }
          groupedByDate[date].push(record);
        });

        let html = '';
        
        // Sort dates in descending order
        const sortedDates = Object.keys(groupedByDate).sort().reverse();
        
        sortedDates.forEach(date => {
          const records = groupedByDate[date];
          const dateObj = new Date(date + 'T00:00:00');
          const formattedDate = dateObj.toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
          });
          
          html += `
            <div style="margin-bottom: 2rem;">
              <h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; color: var(--primary-color);">
                ${formattedDate}
                <span class="badge badge-primary" style="margin-left: 0.5rem;">${records.length}</span>
              </h3>
              <div class="table-container">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Time</th>
                      <th>Student ID</th>
                      <th>Name</th>
                      <th class="hide-mobile">Card UID</th>
                      <th>Grade</th>
                      <th class="hide-mobile">Section</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${records.map(record => `
                      <tr>
                        <td><strong>${record.scanned_at ? new Date(record.scanned_at).toLocaleTimeString() : 'N/A'}</strong></td>
                        <td>${record.student_id || 'N/A'}</td>
                        <td>${record.fullname || 'N/A'}</td>
                        <td class="hide-mobile"><code style="font-size: 0.875rem;">${record.card_uid || 'N/A'}</code></td>
                        <td><span class="badge badge-primary">Grade ${record.grade || 'N/A'}</span></td>
                        <td class="hide-mobile">${record.section || 'N/A'}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          `;
        });

        container.innerHTML = html;
      } catch (error) {
        console.error('Error loading history:', error);
        document.getElementById('historyContainer').innerHTML = `
          <div class="alert alert-error">
            Failed to load attendance history. Please make sure the server is running.
          </div>
        `;
      }
    }

    // Apply filters
    function applyFilters() {
      const filters = {};
      
      const date = document.getElementById('filterDate').value;
      const studentId = document.getElementById('filterStudentId').value.trim();
      const grade = document.getElementById('filterGrade').value;
      const section = document.getElementById('filterSection').value.trim();
      
      if (date) filters.date = date;
      if (studentId) filters.student_id = studentId;
      if (grade) filters.grade = grade;
      if (section) filters.section = section;
      
      currentFilters = filters;
      loadHistory(filters);
    }

    // Clear filters
    function clearFilters() {
      document.getElementById('filterDate').value = '';
      document.getElementById('filterStudentId').value = '';
      document.getElementById('filterGrade').value = '';
      document.getElementById('filterSection').value = '';
      currentFilters = {};
      loadHistory();
    }

    // Export filtered data
    function exportFiltered() {
      const params = new URLSearchParams(currentFilters);
      const url = `${API_URL}/attendance/export${params.toString() ? '?' + params.toString() : ''}`;
      window.location.href = url;
    }

    // Set today's date as default filter
    function setTodayAsDefault() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('filterDate').value = today;
      currentFilters = { date: today };
    }

    // Initialize
    setTodayAsDefault();
    applyFilters(); // Load today's records by default

    // Auto-refresh every 10 seconds
    setInterval(() => {
      loadHistory(currentFilters);
    }, 10000);
  </script>
</body>
</html>
