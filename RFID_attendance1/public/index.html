<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RFID Attendance System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1 class="header-title">
        📚 RFID Attendance
      </h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-btn active">Dashboard</a>
        <a href="register.html" class="nav-btn">Register</a>
        <a href="scanner.html" class="nav-btn">Scanner</a>
        <a href="history.html" class="nav-btn">History</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Welcome to the RFID Attendance System</p>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Students</div>
        <div class="stat-value" id="totalStudents">0</div>
      </div>
      <div class="stat-card" style="border-left-color: var(--secondary-color);">
        <div class="stat-label">Today's Scans</div>
        <div class="stat-value" id="todayScans">0</div>
      </div>
      <div class="stat-card" style="border-left-color: var(--warning-color);">
        <div class="stat-label">Total Scans</div>
        <div class="stat-value" id="totalScans">0</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <h2 class="card-title">Quick Actions</h2>
      <div class="form-grid">
        <a href="register.html" class="btn btn-primary" style="text-align: center;">
          ➕ Register New Student
        </a>
        <a href="scanner.html" class="btn btn-secondary" style="text-align: center;">
          📡 Start Scanning
        </a>
        <a href="history.html" class="btn btn-outline" style="text-align: center;">
          📊 View History
        </a>
        <button onclick="exportData()" class="btn btn-outline">
          📥 Export Data
        </button>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="card">
      <h2 class="card-title">Recent Scans</h2>
      <div id="recentScansContainer">
        <div class="loading">Loading recent activity...</div>
      </div>
    </div>
  </main>

  <script>
    // API Base URL
    const API_URL = 'http://localhost:3000/api';

    // Load stats on page load
    async function loadStats() {
      try {
        const response = await fetch(`${API_URL}/stats`);
        const stats = await response.json();
        
        document.getElementById('totalStudents').textContent = stats.totalStudents || 0;
        document.getElementById('todayScans').textContent = stats.todayScans || 0;
        document.getElementById('totalScans').textContent = stats.totalScans || 0;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    
    // Load recent scans
    async function loadRecentScans() {
      try {
        const response = await fetch(`${API_URL}/attendance`);
        const attendance = await response.json();
        
        const container = document.getElementById('recentScansContainer');
        
        if (attendance.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <div class="empty-state-text">No scans yet</div>
            </div>
          `;
          return;
        }

        // Show only last 5 scans
        const recentScans = attendance.slice(0, 5);
        
        container.innerHTML = `
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Student ID</th>
                  <th>Name</th>
                  <th class="hide-mobile">Grade</th>
                  <th class="hide-mobile">Section</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody>
                ${recentScans.map(scan => `
                  <tr>
                    <td>${scan.student_id}</td>
                    <td><strong>${scan.fullname}</strong></td>
                    <td class="hide-mobile">${scan.grade}</td>
                    <td class="hide-mobile">${scan.section}</td>
                    <td>${formatTimestamp(scan.scanned_at)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        console.error('Error loading recent scans:', error);
        document.getElementById('recentScansContainer').innerHTML = `
          <div class="alert alert-error">
            Failed to load recent scans. Please make sure the server is running.
          </div>
        `;
      }
    }

    // Format timestamp
    function formatTimestamp(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      
      if (seconds < 60) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      
      return date.toLocaleString();
    }

    // Export data
    function exportData() {
      window.location.href = `${API_URL}/attendance/export`;
    }

    // Initialize
    loadStats();
    loadRecentScans();

    // Refresh stats and recent scans every 5 seconds
    setInterval(() => {
      loadStats();
      loadRecentScans();
    }, 5000);
  </script>
</body>
</html>
